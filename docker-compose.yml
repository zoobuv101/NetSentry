---
# NetSentry Docker Compose — Production Stack
# Usage: docker compose up -d
# Prerequisites: copy .env.example to .env and fill in credentials

name: netsentry

services:

  # ── Main application ────────────────────────────────────────────────────────
  netsentry:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: netsentry:latest
    container_name: netsentry
    # Host networking required for Layer 2 ARP scanning
    network_mode: host
    # Minimum capabilities: NET_RAW for ARP/ICMP scanning only
    cap_add:
      - NET_RAW
    cap_drop:
      - ALL
    # Non-root user (UID 1000)
    user: "1000:0"
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - netsentry-data:/data
      - netsentry-config:/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8282/api/v1/system/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    depends_on:
      ntfy:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── ntfy push notifications ─────────────────────────────────────────────────
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: netsentry-ntfy
    restart: unless-stopped
    command: serve
    environment:
      NTFY_BASE_URL: http://ntfy:80
      NTFY_UPSTREAM_BASE_URL: ${NTFY_UPSTREAM_BASE_URL:-}
      NTFY_AUTH_DEFAULT_ACCESS: "allow-read-write"
    volumes:
      - ntfy-data:/var/lib/ntfy
      - ntfy-cache:/var/cache/ntfy
    networks:
      - netsentry-internal
    # Note: ntfy is on the internal bridge network.
    # The netsentry container (host networking) reaches ntfy via the docker
    # bridge gateway IP. Set NTFY_URL=http://172.17.0.1:2586 or use
    # NTFY_URL=http://localhost:2586 with an exposed port.
    ports:
      - "2586:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── LibreSpeed (optional self-hosted speed test) ────────────────────────────
  librespeed:
    image: linuxserver/librespeed:latest
    container_name: netsentry-librespeed
    restart: unless-stopped
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "UTC"
      MODE: "standalone"
      TELEMETRY: "false"
    networks:
      - netsentry-internal
    ports:
      - "8888:80"
    profiles:
      - librespeed  # Only started when: docker compose --profile librespeed up

  # ── Redis cache (optional) ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: netsentry-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - netsentry-internal
    profiles:
      - redis  # Only started when: docker compose --profile redis up
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  netsentry-internal:
    driver: bridge
    name: netsentry-internal

volumes:
  netsentry-data:
    name: netsentry-data
  netsentry-config:
    name: netsentry-config
  ntfy-data:
    name: netsentry-ntfy-data
  ntfy-cache:
    name: netsentry-ntfy-cache
