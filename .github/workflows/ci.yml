name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv==0.4.29

      - name: Install dev dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run ruff (lint)
        run: ruff check .

      - name: Run ruff (format check)
        run: ruff format --check .

      - name: Run mypy
        run: mypy netsentry/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv==0.4.29

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run pytest
        env:
          DB_PATH: ":memory:"
          LOG_LEVEL: "WARNING"
          ENABLE_DECO_INTEGRATION: "false"
          ENABLE_PFSENSE_INTEGRATION: "false"
          ENABLE_ADGUARD_INTEGRATION: "false"
          ENABLE_AI_IDENTIFICATION: "false"
          ENABLE_SPEEDTEST: "false"
        run: pytest --cov=netsentry --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: netsentry:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
