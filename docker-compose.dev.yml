---
# NetSentry Docker Compose — Development Overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Changes from production:
#   - Hot-reload on code changes (uvicorn --reload)
#   - Source code mounted as volume (no rebuild on change)
#   - DB stored in local ./dev-data/ directory
#   - All integrations mocked via MOCK_INTEGRATIONS=true
#   - API exposed on port 8080 explicitly (for clarity)
#   - Debug logging

name: netsentry

services:
  netsentry:
    # Override: mount source code for hot-reload
    volumes:
      - .:/app
      - ./dev-data:/data
      - ./dev-config:/config
    environment:
      LOG_LEVEL: DEBUG
      DB_PATH: /data/netsentry-dev.db
      MOCK_INTEGRATIONS: "true"
      ENABLE_DECO_INTEGRATION: "false"
      ENABLE_PFSENSE_INTEGRATION: "false"
      ENABLE_ADGUARD_INTEGRATION: "false"
      ENABLE_AI_IDENTIFICATION: "false"
      ENABLE_SPEEDTEST: "false"
    # Override: use uvicorn reload for hot-reload
    command: >
      sh -c "alembic upgrade head &&
             uvicorn netsentry.api.main:create_app
             --factory --host 0.0.0.0 --port 8080
             --reload --log-level debug"
    # Expose port explicitly in dev (host networking still active)
    ports: []  # host networking — port is on host directly

  ntfy:
    # Expose ntfy directly on localhost in dev
    ports:
      - "2586:80"
      - "2587:443"
